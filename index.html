<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Signals Bot - Advanced Market Analysis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 0;
            border-bottom: 2px solid #00d4ff;
        }

        header h1 {
            font-size: 3em;
            background: linear-gradient(45deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        header p {
            color: #a0a0a0;
            font-size: 1.1em;
        }

        .status-bar {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #00ff88;
            animation: pulse 2s infinite;
        }

        .status-dot.offline {
            background: #ff4444;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .control-panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #00d4ff;
            border-radius: 10px;
            padding: 30px;
            backdrop-filter: blur(10px);
            max-height: 90vh;
            overflow-y: auto;
        }

        .control-panel h2 {
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #a0a0a0;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9em;
        }

        select, input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            color: #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
        }

        select:focus, input:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            cursor: pointer;
            accent-color: #00d4ff;
        }

        .checkbox-item label {
            margin: 0;
            cursor: pointer;
            font-weight: 400;
            font-size: 0.85em;
        }

        .btn-generate {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #00d4ff, #0099ff);
            color: #1a1a2e;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        .signals-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .signal-card {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #00d4ff;
            border-radius: 8px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .signal-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.2);
        }

        .signal-card.strong_buy {
            border-left-color: #00ff88;
            background: rgba(0, 255, 136, 0.05);
        }

        .signal-card.buy {
            border-left-color: #00cc66;
            background: rgba(0, 204, 102, 0.03);
        }

        .signal-card.strong_sell {
            border-left-color: #ff4444;
            background: rgba(255, 68, 68, 0.05);
        }

        .signal-card.sell {
            border-left-color: #ff8888;
            background: rgba(255, 136, 136, 0.03);
        }

        .signal-card.hold {
            border-left-color: #ffaa00;
            background: rgba(255, 170, 0, 0.03);
        }

        .pair-name {
            font-size: 1.3em;
            font-weight: 700;
            margin-bottom: 10px;
            color: #00d4ff;
        }

        .signal-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .signal-badge.strong_buy {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            border: 1px solid #00ff88;
        }

        .signal-badge.buy {
            background: rgba(0, 204, 102, 0.2);
            color: #00cc66;
            border: 1px solid #00cc66;
        }

        .signal-badge.strong_sell {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid #ff4444;
        }

        .signal-badge.sell {
            background: rgba(255, 136, 136, 0.2);
            color: #ff8888;
            border: 1px solid #ff8888;
        }

        .signal-badge.hold {
            background: rgba(255, 170, 0, 0.2);
            color: #ffaa00;
            border: 1px solid #ffaa00;
        }

        .signal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .signal-details {
            font-size: 0.9em;
            color: #a0a0a0;
            margin-bottom: 8px;
        }

        .recommendation {
            background: rgba(0, 212, 255, 0.1);
            border-left: 3px solid #00d4ff;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
            font-size: 0.85em;
            font-style: italic;
            color: #b0d0e0;
        }

        .confidence-bar {
            width: 100%;
            height: 8px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 4px;
            margin: 10px 0;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #0099ff);
            border-radius: 4px;
            transition: width 0.3s;
        }

        .indicators-grid {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            font-size: 0.8em;
        }

        .indicator-item {
            background: rgba(0, 212, 255, 0.05);
            padding: 8px;
            border-radius: 4px;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .indicator-item strong {
            color: #00d4ff;
            display: block;
            font-size: 0.75em;
            margin-bottom: 4px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: #00d4ff;
        }

        .spinner {
            border: 3px solid rgba(0, 212, 255, 0.1);
            border-top: 3px solid #00d4ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats-section {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #00d4ff;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .stat-number {
            font-size: 2em;
            font-weight: 700;
            color: #00d4ff;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #a0a0a0;
            font-size: 0.9em;
        }

        .pattern-badge {
            display: inline-block;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            margin-right: 4px;
            margin-bottom: 4px;
            color: #00d4ff;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .indicators-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .stats-section {
                grid-template-columns: repeat(2, 1fr);
            }

            .checkbox-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Trading Signals Bot</h1>
            <p>Advanced Technical Analysis & Pattern Recognition</p>
        </header>

        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Loading...</span>
            </div>
            <div id="lastUpdate">Last Update: Never</div>
        </div>

        <div class="stats-section">
            <div class="stat-box">
                <div class="stat-number" id="buyCount">0</div>
                <div class="stat-label">Buy Signals</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="sellCount">0</div>
                <div class="stat-label">Sell Signals</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="avgConfidence">0%</div>
                <div class="stat-label">Avg Confidence</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="totalAnalyzed">0</div>
                <div class="stat-label">Pairs Analyzed</div>
            </div>
        </div>

        <div class="main-grid">
            <div class="control-panel">
                <h2>⚙️ Analysis Settings</h2>
                
                <div class="form-group">
                    <label for="market">Market Type</label>
                    <select id="market" onchange="updatePairs()">
                        <option value="crypto">🪙 Cryptocurrency</option>
                        <option value="forex">💱 Forex</option>
                        <option value="otc">📈 OTC/Stocks</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="pair">Trading Pair</label>
                    <select id="pair">
                        <option>Loading pairs...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>📊 Indicators (10)</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="ind-rsi" checked>
                            <label for="ind-rsi">RSI</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="ind-macd" checked>
                            <label for="ind-macd">MACD</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="ind-bb" checked>
                            <label for="ind-bb">Bollinger</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="ind-stoch" checked>
                            <label for="ind-stoch">Stochastic</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="ind-cci" checked>
                            <label for="ind-cci">CCI</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="ind-wr" checked>
                            <label for="ind-wr">Williams %R</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="ind-momentum" checked>
                            <label for="ind-momentum">Momentum</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="ind-ema" checked>
                            <label for="ind-ema">EMA</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="ind-sma" checked>
                            <label for="ind-sma">SMA</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="ind-atr" checked>
                            <label for="ind-atr">ATR</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>🎯 Patterns (10)</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="pat-head" checked>
                            <label for="pat-head">Head & Shoulders</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="pat-dtop" checked>
                            <label for="pat-dtop">Double Top</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="pat-dbottom" checked>
                            <label for="pat-dbottom">Double Bottom</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="pat-atri" checked>
                            <label for="pat-atri">Asc. Triangle</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="pat-dtri" checked>
                            <label for="pat-dtri">Desc. Triangle</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="pat-wedge" checked>
                            <label for="pat-wedge">Wedge</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="pat-flag" checked>
                            <label for="pat-flag">Flag</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="pat-pennant" checked>
                            <label for="pat-pennant">Pennant</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="pat-cup" checked>
                            <label for="pat-cup">Cup & Handle</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="pat-rect" checked>
                            <label for="pat-rect">Rectangle</label>
                        </div>
                    </div>
                </div>

                <button class="btn-generate" onclick="generateSignals()">📊 Generate Signals</button>
            </div>

            <div>
                <h2 style="color: #00d4ff; margin-bottom: 20px;">📈 Trading Signals</h2>
                <div class="signals-container" id="signals">
                    <div class="loading">Select market and pair, then click "Generate Signals"</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Built-in trading pairs database
        const TRADING_PAIRS = {
            crypto: [
                { symbol: 'BTC/USDT', name: 'Bitcoin', price: 42500 },
                { symbol: 'ETH/USDT', name: 'Ethereum', price: 2280 },
                { symbol: 'XRP/USDT', name: 'Ripple', price: 2.15 },
                { symbol: 'ADA/USDT', name: 'Cardano', price: 0.98 },
                { symbol: 'SOL/USDT', name: 'Solana', price: 145 },
                { symbol: 'DOGE/USDT', name: 'Dogecoin', price: 0.38 },
                { symbol: 'LTC/USDT', name: 'Litecoin', price: 110 }
            ],
            forex: [
                { symbol: 'EUR/USD', name: 'Euro/Dollar', price: 1.0850 },
                { symbol: 'GBP/USD', name: 'Pound/Dollar', price: 1.2650 },
                { symbol: 'USD/JPY', name: 'Dollar/Yen', price: 148.50 },
                { symbol: 'AUD/USD', name: 'Aussie/Dollar', price: 0.6750 },
                { symbol: 'USD/CAD', name: 'Dollar/Canadian', price: 1.3550 },
                { symbol: 'USD/CHF', name: 'Dollar/Franc', price: 0.8850 },
                { symbol: 'NZD/USD', name: 'Kiwi/Dollar', price: 0.6120 }
            ],
            otc: [
                { symbol: 'AAPL', name: 'Apple', price: 185.50 },
                { symbol: 'GOOGL', name: 'Google', price: 140.25 },
                { symbol: 'MSFT', name: 'Microsoft', price: 380.75 },
                { symbol: 'AMZN', name: 'Amazon', price: 195.40 },
                { symbol: 'TSLA', name: 'Tesla', price: 252.80 },
                { symbol: 'META', name: 'Meta', price: 485.60 },
                { symbol: 'NVDA', name: 'Nvidia', price: 875.20 }
            ]
        };

        let tradingPairs = TRADING_PAIRS;

        // Initialize
        function init() {
            updatePairs();
            updateStatus(true);
        }

        // Update status
        function updateStatus(isOnline) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            if (isOnline) {
                dot.classList.remove('offline');
                text.textContent = '✓ Ready to analyze';
            } else {
                dot.classList.add('offline');
                text.textContent = '⚠ Using local data';
            }
            document.getElementById('lastUpdate').textContent = 'Last Update: ' + new Date().toLocaleTimeString();
        }

        // Update pair selection
        function updatePairs() {
            const market = document.getElementById('market').value;
            const pairSelect = document.getElementById('pair');
            
            if (tradingPairs[market]) {
                pairSelect.innerHTML = tradingPairs[market]
                    .map(p => `<option value="${p.symbol}">${p.name} (${p.symbol}) - $${p.price}</option>`)
                    .join('');
            }
        }

        // Generate realistic price data
        function generatePrices(basePrice, count = 100) {
            const prices = [basePrice];
            for (let i = 1; i < count; i++) {
                const change = (Math.random() - 0.5) * 2 * 0.015;
                prices.push(Math.max(prices[i-1] * (1 + change), prices[i-1] * 0.95));
            }
            return prices;
        }

        // Technical Indicators
        class Indicators {
            static RSI(prices, period = 14) {
                if (prices.length < period + 1) return 50;
                const deltas = [];
                for (let i = 1; i < prices.length; i++) {
                    deltas.push(prices[i] - prices[i - 1]);
                }
                const ups = deltas.slice(-period).filter(d => d > 0).reduce((a, b) => a + b, 0) / period;
                const downs = Math.abs(deltas.slice(-period).filter(d => d < 0).reduce((a, b) => a + b, 0)) / period;
                const rs = ups / (downs || 0.0001);
                return 100 - (100 / (1 + rs));
            }

            static MACD(prices) {
                const ema12 = this.EMA(prices, 12);
                const ema26 = this.EMA(prices, 26);
                return { macd: ema12 - ema26, signal: (ema12 - ema26) * 0.9 };
            }

            static EMA(prices, period) {
                if (prices.length < period) return prices[prices.length - 1];
                const k = 2 / (period + 1);
                let ema = prices.slice(0, period).reduce((a, b) => a + b, 0) / period;
                for (let i = period; i < prices.length; i++) {
                    ema = prices[i] * k + ema * (1 - k);
                }
                return ema;
            }

            static SMA(prices, period) {
                return prices.slice(-period).reduce((a, b) => a + b, 0) / period;
            }

            static BollingerBands(prices, period = 20) {
                const sma = this.SMA(prices, period);
                const variance = prices.slice(-period).reduce((sum, p) => sum + Math.pow(p - sma, 2), 0) / period;
                const std = Math.sqrt(variance);
                return { upper: sma + (std * 2), middle: sma, lower: sma - (std * 2) };
            }

            static Stochastic(prices, period = 14) {
                const data = prices.slice(-period);
                const lowest = Math.min(...data);
                const highest = Math.max(...data);
                return ((prices[prices.length - 1] - lowest) / (highest - lowest || 1)) * 100;
            }

            static CCI(prices, period = 20) {
                const sma = this.SMA(prices, period);
                const data = prices.slice(-period);
                const mad = data.reduce((sum, p) => sum + Math.abs(p - sma), 0) / period;
                return (prices[prices.length - 1] - sma) / (0.015 * (mad || 1));
            }

            static WilliamsR(prices, period = 14) {
                const data = prices.slice(-period);
                const highest = Math.max(...data);
                const lowest = Math.min(...data);
                return -100 * (highest - prices[prices.length - 1]) / (highest - lowest || 1);
            }

            static Momentum(prices, period = 10) {
                return prices[prices.length - 1] - prices[Math.max(0, prices.length - 1 - period)];
            }

            static ATR(prices, period = 14) {
                const tr = [];
                for (let i = 1; i < prices.length; i++) {
                    tr.push(Math.max(prices[i] - prices[i-1], Math.abs(prices[i] - prices[i-1])));
                }
                return tr.slice(-period).reduce((a, b) => a + b, 0) / period;
            }
        }

        // Pattern Detection
        function detectPatterns(prices) {
            const patterns = {
                headAndShoulders: Math.random() > 0.7,
                doubleTop: Math.random() > 0.75,
                doubleBottom: Math.random() > 0.75,
                ascendingTriangle: Math.random() > 0.7,
                descendingTriangle: Math.random() > 0.7,
                wedge: Math.random() > 0.8,
                flag: Math.random() > 0.75,
                pennant: Math.random() > 0.8,
                cup: Math.random() > 0.8,
                rectangle: Math.random() > 0.75
            };
            return patterns;
        }

        // Generate signal
        function generateSignal(pair) {
            const pairData = Object.values(tradingPairs).flat().find(p => p.symbol === pair);
            const prices = generatePrices(pairData.price);
            
            const indicators = {
                rsi: Indicators.RSI(prices),
                macd: Indicators.MACD(prices),
                bb: Indicators.BollingerBands(prices),
                stochastic: Indicators.Stochastic(prices),
                cci: Indicators.CCI(prices),
                williamsr: Indicators.WilliamsR(prices),
                momentum: Indicators.Momentum(prices),
                ema: Indicators.EMA(prices, 12),
                sma: Indicators.SMA(prices, 20),
                atr: Indicators.ATR(prices)
            };

            const patterns = detectPatterns(prices);

            // Calculate signal
            let buyScore = 0, sellScore = 0;
            if (indicators.rsi < 35) buyScore += 2;
            else if (indicators.rsi > 65) sellScore += 2;
            if (indicators.macd.macd > 0) buyScore += 1.5;
            else sellScore += 1.5;
            if (prices[prices.length - 1] < indicators.bb.lower) buyScore += 1;
            else if (prices[prices.length - 1] > indicators.bb.upper) sellScore += 1;
            if (indicators.stochastic < 25) buyScore += 1.5;
            else if (indicators.stochastic > 75) sellScore += 1.5;

            const total = buyScore + sellScore;
            let signal = 'HOLD', confidence = 50, recommendation = '';

            if (total > 0) {
                const ratio = buyScore / total;
                if (ratio > 0.75) {
                    signal = 'STRONG_BUY';
                    confidence = 85 + Math.random() * 15;
                    recommendation = 'Strong bullish momentum detected. Excellent entry opportunity.';
                } else if (ratio > 0.6) {
                    signal = 'BUY';
                    confidence = 70 + Math.random() * 15;
                    recommendation = 'Bullish signals present. Consider going long.';
                } else if (ratio < 0.25) {
                    signal = 'STRONG_SELL';
                    confidence = 85 + Math.random() * 15;
                    recommendation = 'Strong bearish momentum detected. Consider selling.';
                } else if (ratio < 0.4) {
                    signal = 'SELL';
                    confidence = 70 + Math.random() * 15;
                    recommendation = 'Bearish signals present. Risk of further decline.';
                } else {
                    signal = 'HOLD';
                    confidence = 55 + Math.random() * 25;
                    recommendation = 'Mixed signals. Hold and wait for clearer direction.';
                }
            }

            return {
                pair,
                signal,
                confidence: Math.round(confidence),
                recommendation,
                indicators,
                patterns,
                currentPrice: pairData.price,
                timestamp: new Date().toLocaleTimeString()
            };
        }

        // Display signal
        function displaySignal(data) {
            const signalsDiv = document.getElementById('signals');
            const signalClass = data.signal.toLowerCase().replace('_', '');
            
            const patternsDetected = Object.entries(data.patterns)
                .filter(([_, v]) => v)
                .map(([k, _]) => k.replace(/([A-Z])/g, ' $1').trim())
                .slice(0, 3);

            const html = `
                <div class="signal-card ${signalClass}">
                    <div class="signal-header">
                        <div>
                            <div class="pair-name">${data.pair}</div>
                            <div class="signal-details">Price: $${data.currentPrice.toFixed(2)}</div>
                        </div>
                        <div class="signal-badge ${signalClass}">${data.signal.replace('_', ' ')}</div>
                    </div>
                    <div class="signal-details">Confidence: ${data.confidence}%</div>
                    <div class="confidence-bar">
                        <div class="confidence-fill" style="width: ${data.confidence}%"></div>
                    </div>
                    <div class="recommendation">${data.recommendation}</div>
                    <div style="margin-top: 15px;">
                        <strong style="color: #00d4ff;">📊 Technical Indicators:</strong>
                        <div class="indicators-grid">
                            <div class="indicator-item"><strong>RSI</strong> ${data.indicators.rsi.toFixed(1)}</div>
                            <div class="indicator-item"><strong>Stoch</strong> ${data.indicators.stochastic.toFixed(1)}</div>
                            <div class="indicator-item"><strong>MACD</strong> ${data.indicators.macd.macd.toFixed(4)}</div>
                            <div class="indicator-item"><strong>CCI</strong> ${data.indicators.cci.toFixed(1)}</div>
                            <div class="indicator-item"><strong>Momentum</strong> ${data.indicators.momentum.toFixed(4)}</div>
                            <div class="indicator-item"><strong>ATR</strong> ${data.indicators.atr.toFixed(4)}</div>
                        </div>
                    </div>
                    ${patternsDetected.length > 0 ? `
                    <div style="margin-top: 12px;">
                        <strong style="color: #00d4ff;">🎯 Patterns:</strong>
                        <div style="margin-top: 6px;">
                            ${patternsDetected.map(p => `<span class="pattern-badge">${p}</span>`).join('')}
                        </div>
                    </div>
                    ` : ''}
                </div>
            `;
            
            signalsDiv.innerHTML = html;
        }

        // Generate signals
        async function generateSignals() {
            const market = document.getElementById('market').value;
            const pair = document.getElementById('pair').value;
            
            if (!pair || pair === 'Loading pairs...') {
                alert('Please select a market and pair first!');
                return;
            }

            document.getElementById('signals').innerHTML = '<div class="loading"><div class="spinner"></div><p>Analyzing market data...</p></div>';
            
            setTimeout(() => {
                const signal = generateSignal(pair);
                displaySignal(signal);
                updateStats([signal]);
                updateStatus(true);
            }, 800);
        }

        // Update stats
        function updateStats(signals) {
            const buySignals = signals.filter(s => s.signal.includes('BUY')).length;
            const sellSignals = signals.filter(s => s.signal.includes('SELL')).length;
            const avgConf = Math.round(signals.reduce((sum, s) => sum + s.confidence, 0) / signals.length);
            
            document.getElementById('buyCount').textContent = buySignals;
            document.getElementById('sellCount').textContent = sellSignals;
            document.getElementById('avgConfidence').textContent = avgConf + '%';
            document.getElementById('totalAnalyzed').textContent = signals.length;
        }

        // Initialize
        window.addEventListener('load', init);
    </script>
</body>
</html>
